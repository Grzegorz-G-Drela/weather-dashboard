<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./render.js" defer></script>
    <script src="./fetch.js" defer></script>
    <script src="./app.js" defer></script>
</head>

<body>

    <div id="top">
        <div id="searchbar">
            <div id="input-wrapper">
                <input type="text" id="city-input" autocomplete="off">
                <div class="error-div"></div>
                <ul id="autocomplete-list"></ul>
            </div>
            <button id="search-button">SEARCH</button>
        </div>
        <!-- TODO: fix from the dropdown autopcomplete - searches with the same detail being multiple, and acting like a different ones
         ie. saving separately in the 'most searched', despite being the same places
        it is an API flaw that WE need to fix ourselves (filter the dropdown list - ?) -->
        <div id="fav-cities"></div>
    </div>

    <div id="bottom">
        <div id="weather">
            <div id="current-weather" class="weather"></div>
            <div id="five-day-forecast"></div>
        </div>
    </div>

</body>

</html>
